

 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Product - Dealora</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="edit-container">
    <h2>Add Product</h2>
    <form id="addProductForm">
      <label>Product Name:</label>
      <input type="text" id="productName" required>

      <label>Product ID (unique):</label>
      <input type="text" id="productId" required>

      <label>Required Users to Unlock Discount:</label>
      <input type="number" id="requiredCount" min="1" required>

      <button type="submit">Add Product</button>
    </form>
  </div>

  <script>
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const productName = document.getElementById('productName').value;
      const productId = document.getElementById('productId').value;
      const requiredCount = parseInt(document.getElementById('requiredCount').value);

      const res = await fetch('http://localhost:3000/api/deals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, productName, requiredCount })
      });

      const data = await res.json();
      alert(data.message);
    });
  </script>

</body>
</html>
